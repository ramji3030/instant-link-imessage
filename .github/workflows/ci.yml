name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '18'
  SWIFT_VERSION: '5.9'
  XCODE_VERSION: '15.1'
  APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
  APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}

jobs:
  # =========================================================
  # Backend Build & Test
  # =========================================================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: instant_link_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd backend
          npm ci
      
      - name: Run linter
        run: |
          cd backend
          npm run lint
      
      - name: Run tests
        run: |
          cd backend
          npm test
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/instant_link_test
          JWT_SECRET: test-secret-key
          NODE_ENV: test
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage/coverage-final.json
          flags: backend
          fail_ci_if_error: false

  # =========================================================
  # iOS Build & Test
  # =========================================================
  ios-build:
    name: iOS Build & Tests
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.1.app/Contents/Developer
      
      - name: Setup Swift
        uses: swift-actions/setup-swift@v1
        with:
          swift-version: ${{ env.SWIFT_VERSION }}
      
      - name: Cache Swift Package Manager
        uses: actions/cache@v3
        with:
          path: ~/.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-
      
      - name: Cache CocoaPods
        uses: actions/cache@v3
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-
      
      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install
        continue-on-error: true
      
      - name: Build iOS app
        run: |
          cd ios
          xcodebuild build \
            -workspace InstantLink.xcworkspace \
            -scheme InstantLink \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug \
            ONLY_ACTIVE_ARCH=YES
      
      - name: Run unit tests
        run: |
          cd ios
          xcodebuild test \
            -workspace InstantLink.xcworkspace \
            -scheme InstantLink \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO
        continue-on-error: true
      
      - name: Archive build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: |
            ios/build/*.app
            ios/build/*.xcarchive
          retention-days: 7

  # =========================================================
  # iMessage Extension Build
  # =========================================================
  imessage-build:
    name: iMessage Extension Build
    runs-on: macos-latest
    needs: [ios-build]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.1.app/Contents/Developer
      
      - name: Build iMessage Extension
        run: |
          cd ios
          xcodebuild build \
            -workspace InstantLink.xcworkspace \
            -scheme InstantLinkMessages \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug \
            ONLY_ACTIVE_ARCH=YES

  # =========================================================
  # Security Scan
  # =========================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true
      
      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  # =========================================================
  # Code Quality Checks
  # =========================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        run: cd backend && npm ci
      
      - name: Check code formatting
        run: |
          cd backend
          npm run format:check
        continue-on-error: true
      
      - name: Run ESLint
        run: |
          cd backend
          npm run lint

  # =========================================================
  # Deploy to Staging (on main branch)
  # =========================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [backend-test, ios-build, security-scan, code-quality]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        run: cd backend && npm ci
      
      - name: Build backend
        run: cd backend && npm run build
      
      - name: Deploy to staging server
        run: |
          echo "Deploying to staging environment..."
          # Add your deployment commands here (e.g., rsync, scp, kubectl, etc.)
          # Example:
          # rsync -avz --delete backend/ ${{ secrets.STAGING_SERVER }}:/var/www/instant-link
        env:
          DEPLOY_KEY: ${{ secrets.STAGING_DEPLOY_KEY }}
        continue-on-error: true

  # =========================================================
  # Production Release (on version tag)
  # =========================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [backend-test, ios-build, security-scan, code-quality]
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            ## Changes
            - See commit history for details
          draft: false
          prerelease: false

  # =========================================================
  # Notify on Failure
  # =========================================================
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [backend-test, ios-build, imessage-build, security-scan, code-quality, deploy-staging]
    if: failure()
    
    steps:
      - name: Send failure notification
        run: |
          echo "Workflow failed for ${{ github.repository }} on branch ${{ github.ref }}"
          echo "Check the workflow run at: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # Add Slack/Discord/Email notification here
        continue-on-error: true
